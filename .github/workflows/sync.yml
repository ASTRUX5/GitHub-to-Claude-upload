name: Supabase GitHub Sync

on:
  repository_dispatch:
    types: [github_sync]
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repo name'
        required: true
      file_path:
        description: 'File path'
        required: true
      content:
        description: 'File content'
        required: false
      action:
        description: 'upsert or delete'
        required: true
      id:
        description: 'Record ID'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ACTION=${{ github.event.inputs.action }}" >> $GITHUB_ENV
            echo "FILE_PATH=${{ github.event.inputs.file_path }}" >> $GITHUB_ENV
            echo "CONTENT=${{ github.event.inputs.content }}" >> $GITHUB_ENV
            echo "RECORD_ID=${{ github.event.inputs.id }}" >> $GITHUB_ENV
            echo "TARGET_REPO=${{ github.event.inputs.repo }}" >> $GITHUB_ENV
          else
            echo "ACTION=${{ github.event.client_payload.action }}" >> $GITHUB_ENV
            echo "FILE_PATH=${{ github.event.client_payload.file_path }}" >> $GITHUB_ENV
            echo "CONTENT=${{ github.event.client_payload.content }}" >> $GITHUB_ENV
            echo "RECORD_ID=${{ github.event.client_payload.id }}" >> $GITHUB_ENV
            echo "TARGET_REPO=${{ github.event.client_payload.repo }}" >> $GITHUB_ENV
          fi

      - name: Clone and push to target repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/ASTRUX5/${TARGET_REPO}.git target_repo
          cd target_repo
          git config user.email "claude-bot@github.com"
          git config user.name "Claude Bot"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/ASTRUX5/${TARGET_REPO}.git

          if [ "$ACTION" = "upsert" ]; then
            mkdir -p "$(dirname "$FILE_PATH")"
            printf '%s' "$CONTENT" > "$FILE_PATH"
            git add "$FILE_PATH"
            git diff --cached --quiet || git commit -m "Claude: upsert $FILE_PATH"
            git push origin main
          elif [ "$ACTION" = "delete" ]; then
            git rm -f "$FILE_PATH"
            git commit -m "Claude: delete $FILE_PATH"
            git push origin main
          fi

      - name: Mark done in Supabase
        if: env.RECORD_ID != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X PATCH "${{ secrets.SUPABASE_URL }}/rest/v1/github_sync?id=eq.$RECORD_ID" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"status":"done"}'
